name: CloudPulse Otomatik CI/CD Dağıtımı 🚀

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Kodlar Kontrol Ediliyor
      uses: actions/checkout@v3

    - name: 2. Almanya Sunucusuna Bağlanılıyor ve Docker Compose Başlatılıyor 🐳
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          echo "🚀 Otomatik Dağıtım ve SSL Kurulumu Başladı..."
          cd ~/cloud-pulse
          
          # 1. En yeni kodları çek
          git pull origin main || git pull origin master
          
          # 2. Eski sistem varsa temizle
          sudo docker rm -f devops-monitor nginx-proxy acme-companion || true
          
          # 3. Şifreleri ortama aktar ve Docker Compose orkestrasyonunu başlat!
          export ADMIN_PASS="${{ secrets.ADMIN_PASS }}"
          export TELEGRAM_TOKEN="${{ secrets.TELEGRAM_TOKEN }}"
          export TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          
          sudo docker compose up -d --build --remove-orphans
            
          echo "✅ Nginx Reverse Proxy & SSL sistemiyle canlıya alındı!"