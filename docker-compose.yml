version: '3.8'

services:
  # 1. TRAFİK POLİSİMİZ (NGINX REVERSE PROXY)
  nginx-proxy:
    image: nginxproxy/nginx-proxy:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - conf:/etc/nginx/conf.d
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - certs:/etc/nginx/certs:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
    restart: always

  # 2. SSL SERTİFİKA ROBOTUMUZ (LET'S ENCRYPT COMPANION)
  acme-companion:
    image: nginxproxy/acme-companion:latest
    container_name: acme-companion
    volumes_from:
      - nginx-proxy
    volumes:
      - certs:/etc/nginx/certs:rw
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DEFAULT_EMAIL=ali0761@gmail.com # Sertifika bildirimleri için mail
    restart: always

  # 3. BİZİM ASIL PROJEMİZ (CLOUDPULSE DEVOPS MONITOR)
  cloud-pulse:
    build: .
    container_name: devops-monitor
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/rancher/k3s/k3s.yaml:/etc/rancher/k3s/k3s.yaml:ro
    environment:
      # Nginx ve SSL robotuna "Bu konteyneri bu alan adına bağla" diyen sihirli komutlar:
      - VIRTUAL_HOST=cloudpulse-ali.duckdns.org
      - LETSENCRYPT_HOST=cloudpulse-ali.duckdns.org
      # Sistem şifrelerimiz:
      - ADMIN_USER=sysadmin
      - ADMIN_PASS=${ADMIN_PASS}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}

volumes:
  conf:
  vhost:
  html:
  certs:
  acme: