<!DOCTYPE html>
<html lang="tr" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudPulse | DevOps Kontrol Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .stat-value { font-size: 2rem; font-weight: 700; color: #38bdf8; }
        .table { --bs-table-bg: transparent; --bs-table-color: #f8fafc; }
        .table border-color { border-color: #334155; }
        .badge-running { background-color: #10b981; color: #fff; }
        .badge-exited { background-color: #ef4444; color: #fff; }
        .navbar { background-color: #1e293b !important; border-bottom: 1px solid #334155; }
    </style>
</head>
<body class="p-4">

    <!-- Üst Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-4 rounded px-3">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold">⚡ CloudPulse <small class="text-muted fs-6">| DevOps Kontrol Paneli</small></span>
            <div class="d-flex align-items-center">
                <span class="badge bg-success me-3">🟢 Canlı Bağlantı</span>
                <a href="/logout" class="btn btn-sm btn-outline-danger fw-bold">🔒 Güvenli Çıkış</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid max-w-7xl">
        <!-- Bildirim Alanı -->
        <div id="alertBox" class="alert d-none" role="alert"></div>

        <!-- Donanım Kartları -->
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h6 class="text-muted">CPU KULLANIMI</h6>
                    <div class="stat-value" id="cpu-val">%0</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h6 class="text-muted">RAM KULLANIMI (12 GB)</h6>
                    <div class="stat-value" id="mem-val">%0</div>
                    <small class="text-muted" id="mem-detail">0 GB / 0 GB</small>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h6 class="text-muted">DİSK DOLULUK ORANI</h6>
                    <div class="stat-value" id="disk-val">%0</div>
                </div>
            </div>
        </div>

        <!-- Grafik ve Tablo Alanı -->
        <div class="row g-4">
            <div class="col-md-7">
                <div class="card p-3">
                    <h5 class="mb-3">📈 Gerçek Zamanlı Sistem Yükü</h5>
                    <canvas id="sysChart" height="150"></canvas>
                </div>
            </div>
            <div class="col-md-5">
                <div class="card p-3">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0">🐳 Docker Servisleri</h5>
                        <button class="btn btn-sm btn-outline-info" onclick="fetchContainers()">Yenile</button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>İsim</th>
                                    <th>Durum</th>
                                    <th>İşlem</th>
                                </tr>
                            </thead>
                            <tbody id="container-list">
                                <tr><td colspan="3" class="text-center text-muted">Yükleniyor...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (Açılır Menüler İçin Zorunlu) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Grafik Kurulumu
        const ctx = document.getElementById('sysChart').getContext('2d');
        const sysChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'CPU (%)', borderColor: '#38bdf8', data: [], tension: 0.3 },
                    { label: 'RAM (%)', borderColor: '#818cf8', data: [], tension: 0.3 }
                ]
            },
            options: { responsive: true, scales: { y: { beginAtZero: true, max: 100 } } }
        });

        function showAlert(message, type="success") {
            const box = document.getElementById('alertBox');
            box.className = `alert alert-${type} alert-dismissible fade show fw-bold`;
            box.innerHTML = `${message} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
            box.classList.remove('d-none');
            setTimeout(() => box.classList.add('d-none'), 4000);
        }

        async function fetchStats() {
            try {
                const res = await fetch('/api/stats');
                if (res.redirected) { window.location.href = '/login'; return; }
                const data = await res.json();
                
                document.getElementById('cpu-val').innerText = `%${data.cpu.percent}`;
                document.getElementById('mem-val').innerText = `%${data.memory.percent}`;
                document.getElementById('mem-detail').innerText = `${data.memory.used_gb} GB / ${data.memory.total_gb} GB`;
                document.getElementById('disk-val').innerText = `%${data.disk.percent}`;

                const now = new Date().toLocaleTimeString();
                if (sysChart.data.labels.length > 10) {
                    sysChart.data.labels.shift();
                    sysChart.data.datasets[0].data.shift();
                    sysChart.data.datasets[1].data.shift();
                }
                sysChart.data.labels.push(now);
                sysChart.data.datasets[0].data.push(data.cpu.percent);
                sysChart.data.datasets[1].data.push(data.memory.percent);
                sysChart.update();
            } catch (e) { console.error("Metrik hatası:", e); }
        }

        async function fetchContainers() {
            try {
                const res = await fetch('/api/containers');
                const data = await res.json();
                const tbody = document.getElementById('container-list');
                tbody.innerHTML = '';

                if (data.error) {
                    tbody.innerHTML = `<tr><td colspan="3" class="text-danger small">${data.error}</td></tr>`;
                    return;
                }

                data.containers.forEach(c => {
                    const isUp = c.status.toLowerCase().includes('up') || c.status.toLowerCase().includes('running');
                    const badgeClass = isUp ? 'badge-running' : 'badge-exited';
                    
                    tbody.innerHTML += `
                        <tr>
                            <td class="fw-bold small">${c.name}</td>
                            <td><span class="badge ${badgeClass}">${c.status}</span></td>
                            <td>
                                <div class="dropdown">
                                    <button class="btn btn-sm btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                        ⚡ Yönet
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-dark">
                                        <li><a class="dropdown-item text-success" href="#" onclick="manageAction('${c.id}', 'start')">▶️ Başlat</a></li>
                                        <li><a class="dropdown-item text-warning" href="#" onclick="manageAction('${c.id}', 'restart')">🔄 Yeniden Başlat</a></li>
                                        <li><a class="dropdown-item text-danger" href="#" onclick="manageAction('${c.id}', 'stop')">⏸️ Durdur</a></li>
                                        <li><hr class="dropdown-divider"></li>
                                        <li><a class="dropdown-item text-danger fw-bold" href="#" onclick="manageAction('${c.id}', 'delete')">🗑️ Sil (Kaldır)</a></li>
                                    </ul>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } catch (e) { console.error("Docker hatası:", e); }
        }

        async function manageAction(id, action) {
            if (action === 'delete' && !confirm("Bu konteyneri kalıcı olarak silmek istediğinize emin misiniz?")) return;
            
            try {
                const res = await fetch(`/api/containers/${id}/${action}`, { method: 'POST' });
                const data = await res.json();
                
                if (res.ok) {
                    showAlert(data.message, "success");
                    fetchContainers(); // Tabloyu anında güncelle!
                } else {
                    showAlert(data.message, "danger");
                }
            } catch (e) {
                showAlert("İşlem sırasında bir hata oluştu!", "danger");
            }
        }

        setInterval(fetchStats, 2000);
        setInterval(fetchContainers, 5000);
        fetchStats();
        fetchContainers();
    </script>
</body>
</html>
