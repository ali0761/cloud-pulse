<!DOCTYPE html>
<html lang="tr" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudPulse | DevOps Sunucu Yönetim Paneli</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js CDN (Grafikler için) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .card-title { color: #94a3b8; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .metric-value { font-size: 2.2rem; font-weight: 700; color: #f8fafc; }
        .status-badge { font-size: 0.8rem; padding: 0.35em 0.65em; }
        .navbar { background-color: #1e293b !important; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

    <!-- Üst Menü -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-4 py-3">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
                <span class="fs-4 me-2">⚡</span> CloudPulse <span class="badge bg-primary ms-2 fs-6">v1.0</span>
            </a>
            <span class="navbar-text text-success fw-semibold">
                ● Canlı Bağlantı (Local / Sunucu)
            </span>
        </div>
    </nav>

    <!-- Ana İçerik -->
    <div class="container">
        
        <!-- Üst Gösterge Kartları -->
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card p-4">
                    <div class="card-title">İşlemci (CPU) Yükü</div>
                    <div class="metric-value" id="cpu-text">%0.0</div>
                    <div class="progress mt-2" style="height: 6px;">
                        <div id="cpu-bar" class="progress-bar bg-info" role="progressbar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4">
                    <div class="card-title">Bellek (RAM) Kullanımı</div>
                    <div class="metric-value" id="ram-text">%0.0</div>
                    <div class="text-muted small mt-1" id="ram-detail">0 GB / 0 GB</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4">
                    <div class="card-title">Disk Doluluk Oranı</div>
                    <div class="metric-value" id="disk-text">%0.0</div>
                    <div class="progress mt-2" style="height: 6px;">
                        <div id="disk-bar" class="progress-bar bg-warning" role="progressbar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Canlı Grafik ve Docker Tablosu -->
        <div class="row g-4">
            <!-- Canlı CPU & RAM Grafigi -->
            <div class="col-lg-7">
                <div class="card p-4 h-100">
                    <h5 class="fw-bold mb-3 text-light">📈 Gerçek Zamanlı Kaynak Tüketimi</h5>
                    <canvas id="realtimeChart" height="180"></canvas>
                </div>
            </div>

            <!-- Docker Konteyner Listesi -->
            <div class="col-lg-5">
                <div class="card p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold mb-0 text-light">🐳 Docker Servisleri</h5>
                        <button class="btn btn-sm btn-outline-light" onclick="fetchContainers()">Yenile</button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-dark table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>İsim</th>
                                    <th>Durum</th>
                                    <th class="text-end">İşlem</th>
                                </tr>
                            </thead>
                            <tbody id="container-list">
                                <tr>
                                    <td colspan="3" class="text-center text-muted small py-3">Veriler yükleniyor...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- JavaScript - Canlı Veri Akışı ve Grafik Yönetimi -->
    <script>
        // 1. Grafik Kurulumu (Chart.js)
        const ctx = document.getElementById('realtimeChart').getContext('2d');
        const realtimeChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Zaman damgaları
                datasets: [
                    {
                        label: 'CPU (%)',
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.1)',
                        data: [],
                        tension: 0.4,
                        fill: true
                    },
                    {
                        label: 'RAM (%)',
                        borderColor: '#818cf8',
                        backgroundColor: 'rgba(129, 140, 248, 0.1)',
                        data: [],
                        tension: 0.4,
                        fill: true
                    }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true, max: 100 }
                },
                animation: { duration: 0 } // Akıcı canlı yayın için animasyonu kapatıyoruz
            }
        });

        // 2. Metrikleri Arka Plandan Çeken Fonksiyon
        async function fetchStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();

                // Metinleri Güncelle
                document.getElementById('cpu-text').innerText = `%${data.cpu.percent}`;
                document.getElementById('cpu-bar').style.width = `%${data.cpu.percent}`;
                
                document.getElementById('ram-text').innerText = `%${data.memory.percent}`;
                document.getElementById('ram-detail').innerText = `${data.memory.used_gb} GB / ${data.memory.total_gb} GB Kullanılıyor`;
                
                document.getElementById('disk-text').innerText = `%${data.disk.percent}`;
                document.getElementById('disk-bar').style.width = `%${data.disk.percent}`;

                // Grafiğe Yeni Veri Ekle
                const now = new Date().toLocaleTimeString('tr-TR', { second: '2-digit', minute: '2-digit' });
                
                if (realtimeChart.data.labels.length > 10) {
                    realtimeChart.data.labels.shift();
                    realtimeChart.data.datasets[0].data.shift();
                    realtimeChart.data.datasets[1].data.shift();
                }

                realtimeChart.data.labels.push(now);
                realtimeChart.data.datasets[0].data.push(data.cpu.percent);
                realtimeChart.data.datasets[1].data.push(data.memory.percent);
                realtimeChart.update();

            } catch (error) {
                console.error("Veri çekilemedi:", error);
            }
        }

        // 3. Docker Konteynerlerini Çeken Fonksiyon
        async function fetchContainers() {
            try {
                const response = await fetch('/api/containers');
                const data = await response.json();
                const tbody = document.getElementById('container-list');
                tbody.innerHTML = '';

                if (data.containers.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted small py-3">Çalışan Docker konteyneri bulunamadı.</td></tr>';
                    return;
                }

                data.containers.forEach(c => {
                    const statusClass = c.status.includes('up') ? 'bg-success' : 'bg-secondary';
                    tbody.innerHTML += `
                        <tr>
                            <td class="fw-semibold">${c.name}</td>
                            <td><span class="badge ${statusClass} status-badge">${c.status}</span></td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-info py-0" onclick="alert('Faz 4\'te aktif edilecek: ${c.name}')">Yönet</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Docker verisi çekilemedi:", error);
            }
        }

        // Her 2 saniyede bir verileri otomatik yenile!
        setInterval(fetchStats, 2000);
        fetchStats();
        fetchContainers();
    </script>
</body>
</html>
