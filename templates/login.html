<!DOCTYPE html>
<html lang="tr" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap | CloudPulse DevOps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 400px; padding: 2.5rem; }
        .form-control { background-color: #0f172a; border-color: #334155; color: #f8fafc; }
        .form-control:focus { background-color: #0f172a; border-color: #38bdf8; box-shadow: 0 0 0 0.2rem rgba(56, 189, 248, 0.25); color: #fff; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <span style="font-size: 3rem;">⚡</span>
            <h4 class="fw-bold mt-2 text-light">CloudPulse Panel</h4>
            <p class="text-muted small">DevOps Altyapısı Güvenli Giriş</p>
        </div>

        {% if error %}
        <div class="alert alert-danger py-2 text-center small fw-semibold" role="alert">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-3">
                <label class="form-label text-secondary small fw-bold">KULLANICI ADI</label>
                <input type="text" name="username" class="form-control" required placeholder="admin">
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary small fw-bold">ŞİFRE</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">SİSTEME GİRİŞ YAP</button>
        </form>
        <div class="text-center mt-4">
            <span class="text-muted" style="font-size: 0.75rem;">🔒 256-bit Session Encryption Active</span>
        </div>
    </div>
</body>
</html>
